[tox]
envlist = build_win, build_macos, build_linux
skipsdist = True

[testenv]
allowlist_externals = python
deps =
    build
    pyinstaller
    Pillow

[testenv:build_win]
commands =
    python -m build --wheel --outdir dist/
    python -c "from PIL import Image; img = Image.open('src/comiccatcher/resources/app_256.png'); img.save('packaging/windows/comiccatcher.ico', format='ICO', sizes=[(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)])"
    python -m PyInstaller --noconfirm --windowed --onefile \
        --name "ComicCatcher" \
        --icon "packaging/windows/comiccatcher.ico" \
        --collect-all "comiccatcher" \
        --add-data "src/comiccatcher/resources;comiccatcher/resources" \
        "src/comiccatcher/main.py"

[testenv:build_macos]
commands =
    python -m build --wheel --outdir dist/
    # Note: build_dmg.sh handles the icon conversion via sips/iconutil
    python -m PyInstaller --noconfirm --windowed --onefile \
        --name "ComicCatcher" \
        --icon "packaging/macos/comiccatcher.icns" \
        --collect-all "comiccatcher" \
        --add-data "src/comiccatcher/resources:comiccatcher/resources" \
        "src/comiccatcher/main.py"
